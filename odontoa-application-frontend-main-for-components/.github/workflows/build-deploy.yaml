name: Build & Deploy React to Azure Container App

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - main
          - dev

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/odontoa-organization/${{ github.event.repository.name }}-${{ inputs.environment || github.ref_name }}

jobs:
  docker-build-push-ghcr:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || github.ref_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag Docker image
        run: docker build --build-arg VITE_API_URL=${{ vars.API_URL }} -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker images to GHCR
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

  azure-deploy:
    needs: docker-build-push-ghcr
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || github.ref_name }}
    
    steps:
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name odontoa-frontend-${{ inputs.environment || github.ref_name }} \
            --resource-group odontoa-${{ inputs.environment || github.ref_name }}-rg \
            --image $IMAGE_NAME:${{ github.sha }}
